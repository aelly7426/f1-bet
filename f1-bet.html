<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
<meta http-equiv="Pragma" content="no-cache">
<meta http-equiv="Expires" content="0">
<title>F1 Bet 🏎️</title>
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Exo+2:wght@300;400;600&display=swap" rel="stylesheet">
<style>
  :root {
    --red:#E10600; --gold:#FFD700; --silver:#C0C0C0; --bronze:#CD7F32;
    --bg:#0a0a0f; --surface:#12121a; --surface2:#1a1a26;
    --border:rgba(225,6,0,0.3); --text:#f0f0f0; --muted:#888;
  }
  *{margin:0;padding:0;box-sizing:border-box;}
  html{font-size:clamp(13px,1.8vw,16px);}
  body{font-family:'Exo 2',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;overflow-x:hidden;}
  body::before{content:'';position:fixed;inset:0;
    background-image:linear-gradient(rgba(225,6,0,0.03) 1px,transparent 1px),linear-gradient(90deg,rgba(225,6,0,0.03) 1px,transparent 1px);
    background-size:40px 40px;pointer-events:none;z-index:0;}
  .wrap{max-width:880px;margin:0 auto;padding:clamp(12px,3vw,24px) clamp(12px,4vw,20px) 80px;position:relative;z-index:1;}

  /* HEADER */
  header{text-align:center;padding:clamp(20px,4vw,40px) 0 clamp(16px,3vw,30px);}
  .hline{width:clamp(50px,8vw,80px);height:3px;background:var(--red);margin:0 auto clamp(12px,2vw,20px);box-shadow:0 0 12px var(--red);}
  header h1{font-family:'Orbitron',sans-serif;font-size:clamp(22px,5vw,52px);font-weight:900;letter-spacing:clamp(2px,0.5vw,4px);color:#fff;text-shadow:0 0 30px rgba(225,6,0,0.5);}
  header h1 span{color:var(--red);}
  header p{color:var(--muted);font-size:clamp(10px,1.5vw,13px);letter-spacing:2px;text-transform:uppercase;margin-top:8px;}

  /* TABS */
  .tabs{display:flex;gap:4px;background:var(--surface);border:1px solid var(--border);border-radius:8px;padding:4px;margin-bottom:clamp(16px,3vw,28px);}
  .tab{flex:1;padding:clamp(7px,1.5vw,10px) clamp(4px,1vw,10px);border:none;background:transparent;color:var(--muted);font-family:'Orbitron',sans-serif;font-size:clamp(8px,1.2vw,11px);letter-spacing:clamp(0.5px,0.2vw,1.5px);text-transform:uppercase;cursor:pointer;border-radius:6px;transition:all .2s;}
  .tab.active{background:var(--red);color:#fff;box-shadow:0 0 16px rgba(225,6,0,0.4);}
  .tab:hover:not(.active){color:#fff;background:rgba(255,255,255,0.05);}
  .section{display:none;} .section.active{display:block;}

  /* CARD */
  .card{background:var(--surface);border:1px solid var(--border);border-radius:12px;padding:clamp(14px,3vw,24px);margin-bottom:clamp(12px,2vw,20px);position:relative;overflow:hidden;}
  .card::before{content:'';position:absolute;top:0;left:0;right:0;height:2px;background:linear-gradient(90deg,transparent,var(--red),transparent);}
  .card-title{font-family:'Orbitron',sans-serif;font-size:clamp(10px,1.5vw,12px);letter-spacing:2px;color:var(--red);text-transform:uppercase;margin-bottom:clamp(12px,2vw,18px);}

  /* FORM */
  .form-row{display:grid;grid-template-columns:1fr 1fr;gap:14px;margin-bottom:14px;}
  @media(max-width:500px){.form-row{grid-template-columns:1fr;}}
  label{display:block;font-size:clamp(10px,1.3vw,11px);letter-spacing:1.5px;color:var(--muted);text-transform:uppercase;margin-bottom:6px;}
  input,select{width:100%;background:var(--surface2);border:1px solid rgba(255,255,255,0.1);border-radius:6px;padding:clamp(8px,1.5vw,10px) clamp(10px,2vw,14px);color:var(--text);font-family:'Exo 2',sans-serif;font-size:clamp(13px,1.8vw,14px);transition:border-color .2s;appearance:none;}
  input:focus,select:focus{outline:none;border-color:var(--red);box-shadow:0 0 0 2px rgba(225,6,0,0.15);}
  select option{background:#1a1a26;}

  /* BUTTONS */
  .btn{width:100%;padding:clamp(10px,2vw,14px);background:var(--red);border:none;border-radius:8px;color:#fff;font-family:'Orbitron',sans-serif;font-size:clamp(10px,1.5vw,13px);letter-spacing:clamp(1px,0.3vw,2px);text-transform:uppercase;cursor:pointer;transition:all .2s;box-shadow:0 4px 20px rgba(225,6,0,0.3);}
  .btn:hover{background:#ff1a00;box-shadow:0 4px 28px rgba(225,6,0,0.5);transform:translateY(-1px);}
  .btn:active{transform:translateY(0);}
  .btn.sec{background:transparent;border:1px solid var(--border);box-shadow:none;color:var(--muted);}
  .btn.sec:hover{background:rgba(255,255,255,0.05);color:#fff;}
  .btn.grn{background:#00843d;box-shadow:0 4px 20px rgba(0,132,61,0.3);}
  .btn.grn:hover{background:#00a84e;}

  /* PICKS GRID */
  .picks-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:clamp(6px,1.5vw,10px);}
  @media(max-width:480px){.picks-grid{grid-template-columns:1fr;}}
  .pick-slot label{display:flex;align-items:center;gap:6px;}
  .medal{display:inline-block;width:clamp(16px,2.5vw,18px);height:clamp(16px,2.5vw,18px);border-radius:50%;font-size:clamp(9px,1.2vw,10px);font-weight:700;text-align:center;line-height:clamp(16px,2.5vw,18px);font-family:'Orbitron',sans-serif;}
  .medal.p1{background:var(--gold);color:#000;}
  .medal.p2{background:var(--silver);color:#000;}
  .medal.p3{background:var(--bronze);color:#000;}

  /* SESSION SUB-HEADER */
  .sess-head{display:flex;justify-content:space-between;align-items:center;margin-bottom:12px;padding-bottom:8px;border-bottom:1px solid rgba(255,255,255,0.07);}
  .sess-label{font-family:'Orbitron',sans-serif;font-size:clamp(9px,1.3vw,11px);letter-spacing:2px;color:rgba(255,255,255,0.55);text-transform:uppercase;}
  .sess-mult{font-size:clamp(9px,1.2vw,10px);padding:2px 9px;border-radius:4px;background:rgba(225,6,0,0.1);color:var(--red);border:1px solid rgba(225,6,0,0.25);font-family:'Orbitron',sans-serif;}
  .sess-block{margin-bottom:clamp(12px,2vw,18px);}
  .sess-block:last-child{margin-bottom:0;}
  hr.divider{border:none;border-top:1px solid rgba(255,255,255,0.06);margin:clamp(12px,2vw,18px) 0;}

  /* BADGES */
  .badge-locked{font-size:clamp(9px,1.2vw,10px);padding:3px 10px;border-radius:10px;background:rgba(0,200,100,0.15);color:#00c864;border:1px solid rgba(0,200,100,0.3);font-family:'Orbitron',sans-serif;white-space:nowrap;}
  .badge-pending{font-size:clamp(9px,1.2vw,10px);padding:3px 10px;border-radius:10px;background:rgba(225,6,0,0.1);color:var(--red);border:1px solid rgba(225,6,0,0.2);font-family:'Orbitron',sans-serif;white-space:nowrap;}

  /* RESULTS INPUT */
  .res-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:clamp(8px,2vw,12px);margin-bottom:14px;}
  @media(max-width:480px){.res-grid{grid-template-columns:1fr;}}
  .res-slot{background:var(--surface2);border-radius:10px;padding:clamp(10px,2vw,14px);text-align:center;border:1px solid rgba(255,255,255,0.07);}
  .res-slot.p1{border-color:rgba(255,215,0,0.35);}
  .res-slot.p2{border-color:rgba(192,192,192,0.25);}
  .res-slot.p3{border-color:rgba(205,127,50,0.25);}
  .res-trophy{font-size:clamp(18px,3vw,22px);margin-bottom:8px;}

  /* SCOREBOARD */
  .scoreboard{display:flex;flex-direction:column;gap:8px;}
  .score-row{display:flex;align-items:center;gap:clamp(6px,1.5vw,12px);background:var(--surface2);border-radius:8px;padding:clamp(10px,2vw,14px) clamp(10px,2vw,16px);border:1px solid rgba(255,255,255,0.06);transition:all .3s;position:relative;overflow:hidden;}
  .score-row.winner{border-color:var(--gold);box-shadow:0 0 20px rgba(255,215,0,0.15);}
  .score-row.winner::before{content:'';position:absolute;inset:0;background:linear-gradient(90deg,rgba(255,215,0,0.05),transparent);pointer-events:none;}
  .score-row.second{border-color:var(--silver);}
  .score-row.third{border-color:var(--bronze);}
  .score-rank{font-family:'Orbitron',sans-serif;font-size:clamp(12px,2vw,15px);font-weight:900;width:clamp(22px,3vw,30px);text-align:center;}
  .score-name{font-weight:700;font-size:clamp(12px,2vw,16px);font-family:'Orbitron',sans-serif;letter-spacing:clamp(1px,0.3vw,2px);min-width:44px;}
  .score-breakdown{flex:1;display:flex;flex-direction:column;gap:5px;}
  .sess-breakdown-line{display:flex;flex-wrap:wrap;gap:4px;align-items:center;}
  .sess-breakdown-label{font-size:clamp(9px,1.2vw,10px);color:var(--muted);min-width:clamp(80px,12vw,110px);flex-shrink:0;}
  .hit-badge{font-size:clamp(9px,1.2vw,10px);padding:2px 7px;border-radius:3px;font-family:'Orbitron',sans-serif;white-space:nowrap;}
  .hit-badge.hit{background:rgba(0,200,100,0.15);color:#00c864;border:1px solid rgba(0,200,100,0.3);}
  .hit-badge.miss{background:rgba(255,255,255,0.04);color:rgba(255,255,255,0.2);border:1px solid rgba(255,255,255,0.07);}
  .sess-pts{font-size:clamp(9px,1.2vw,10px);color:rgba(255,255,255,0.3);white-space:nowrap;}
  .score-prize{font-family:'Orbitron',sans-serif;font-size:clamp(12px,2vw,15px);font-weight:700;text-align:right;min-width:clamp(70px,12vw,90px);}
  .score-row.winner .score-prize{color:var(--gold);}
  .score-row.second .score-prize{color:var(--silver);}
  .score-row.third .score-prize{color:var(--bronze);}

  /* TOTAL BAR */
  .total-bar{background:linear-gradient(135deg,rgba(225,6,0,0.12),rgba(225,6,0,0.04));border:1px solid rgba(225,6,0,0.3);border-radius:10px;padding:clamp(12px,2vw,16px) clamp(14px,3vw,22px);margin-top:10px;display:flex;justify-content:space-between;align-items:center;}
  .total-bar-label{font-family:'Orbitron',sans-serif;font-size:clamp(9px,1.2vw,10px);letter-spacing:2px;color:var(--muted);}
  .total-bar-prize{font-family:'Orbitron',sans-serif;font-size:clamp(16px,3vw,20px);font-weight:900;color:var(--red);text-shadow:0 0 16px rgba(225,6,0,0.4);}

  /* NOTICE */
  .notice{background:rgba(225,6,0,0.08);border:1px solid rgba(225,6,0,0.2);border-radius:8px;padding:clamp(10px,2vw,12px) clamp(12px,2.5vw,16px);font-size:clamp(11px,1.5vw,12px);color:rgba(255,150,150,0.9);margin-bottom:16px;line-height:1.5;}

  /* PC 넓은 화면 */
  @media(min-width:768px){
    .picks-grid{grid-template-columns:repeat(3,1fr);}
    .res-grid{grid-template-columns:repeat(3,1fr);}
  }
</style>
</head>

<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
  import { getDatabase, ref, set, onValue } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-database.js";

  const firebaseConfig = {
    apiKey: "AIzaSyBoNhuD0eMC5iJ-y2QB43PF40m-vr2eAAc",
    authDomain: "f1-bet-2ee93.firebaseapp.com",
    databaseURL: "https://f1-bet-2ee93-default-rtdb.asia-southeast1.firebasedatabase.app",
    projectId: "f1-bet-2ee93",
    storageBucket: "f1-bet-2ee93.firebasestorage.app",
    messagingSenderId: "752294050275",
    appId: "1:752294050275:web:661989c120f1ec41e888d6"
  };

  const app = initializeApp(firebaseConfig);
  const db  = getDatabase(app);

  // Firebase 저장 (debounce 300ms)
  let _saveTimer = null;
  window.fbSave = function() {
    clearTimeout(_saveTimer);
    const ts = Date.now();
    window._lastSavedTs = ts;  // 즉시 세팅 — debounce 전에 수신이 와도 무시
    _saveTimer = setTimeout(() => {
      const payload = {
        state: {
          raceName:      window._state.raceName,
          weekendType:   window._state.weekendType,
          constructors:  window._state.constructors,
          participants:  window._state.participants,
          results:       window._state.results,
          resultLocked:  window._state.resultLocked,
          roundData:     window._state.roundData,
        },
        seasonLog: window._seasonLog,
        ts
      };
      set(ref(db, 'f1bet'), payload).catch(e => console.error('FB save error', e));
    }, 300);
  };

  // Firebase 실시간 수신
  window._lastSavedTs = 0;

  onValue(ref(db, 'f1bet'), (snapshot) => {
    const data = snapshot.val();
    if (!data) { window.setFbStatus('🟢 연결됨 (데이터 없음)'); return; }
    if (data.ts && data.ts === window._lastSavedTs) {
      window.setFbStatus('🟢 실시간 연결됨');
      return;
    }

    // state 덮어쓰기
    if (data.state) {
      window._state.raceName     = data.state.raceName     || '';
      window._state.weekendType  = data.state.weekendType  || 'gp';
      if (data.state.constructors) {
        window._state.constructors = data.state.constructors;
        state.constructors = data.state.constructors;
      }
      window._state.roundData    = data.state.roundData    || {};
      // 현재 라운드 데이터를 roundData에서 불러오기
      const rn = window._state.raceName;
      const rd = window._state.roundData[rn];
      if (rd) {
        window._state.participants  = rd.participants;
        window._state.results       = rd.results;
        window._state.resultLocked  = rd.resultLocked || {};
      } else {
        window._state.participants  = data.state.participants  || window._state.participants;
        window._state.results       = data.state.results       || {};
        window._state.resultLocked  = data.state.resultLocked  || {};
      }
    }
    if (Array.isArray(data.seasonLog)) window._seasonLog = data.seasonLog;

    // 현재 탭 리렌더
    const tabs = ['setup','predict','result','season'];
    const activeTab = document.querySelector('.tab.active');
    const idx = activeTab ? [...document.querySelectorAll('.tab')].indexOf(activeTab) : -1;
    const tab = idx >= 0 ? tabs[idx] : '';
    if (tab === 'predict') window.renderPredict();
    if (tab === 'result')  window.syncResultTab();
    if (tab === 'season')  window.renderSeason();
    if (tab === 'setup')   { window.renderConstructors(); window.syncSetupUI(); }

    window.setFbStatus('🟢 실시간 연결됨');
  });

  window.setFbStatus = function(msg) {
    const el = document.getElementById('fbStatus');
    if (el) el.textContent = msg;
    const dot = document.getElementById('fb-dot');
    if (dot) {
      if (msg.includes('🟢')) {
        dot.style.background = '#00c864';
        dot.style.boxShadow = '0 0 8px #00c864';
        dot.title = '실시간 연결됨 ✅';
      } else if (msg.includes('🔄')) {
        dot.style.background = '#888';
        dot.style.boxShadow = '0 0 6px #888';
        dot.title = '연결 중...';
      } else {
        dot.style.background = '#ff4444';
        dot.style.boxShadow = '0 0 8px #ff4444';
        dot.title = '연결 끊김 ❌';
      }
    }
  };
  window.setFbStatus('🔄 연결 중...');
</script>

function ensureSessions() {

  });

// ── Helpers ──────────────────────────────────────────────
function constructorMult(team) {
  const rank = state.constructors.indexOf(team) + 1;
  if (rank >= 1 && rank <= 4) return 1;
  if (rank >= 5 && rank <= 7) return 2;
  return 3;
}

function calcSession(picks, actual, sessMult) {
  const basePts = [3, 2, 1];
  let raw = 0, correct = 0, details = [];
  picks.forEach((pick, i) => {
    if (pick && pick === actual[i]) {
      const base = basePts[i];
      const cm = constructorMult(DRIVER_TEAM[pick] || '');
      raw += base * cm;
      correct++;
      details.push({ pos: i+1, base, cm, hit: true });
    } else {
      details.push({ pos: i+1, base: 0, cm: 0, hit: false });
    }
  });
  const correctMult = correct === 3 ? 2 : correct >= 2 ? 1.5 : 1;
  const totalPts = raw * correctMult * sessMult;
  const prize = Math.round(totalPts * 5000);
  return { raw, correct, correctMult, sessMult, totalPts, prize, details };
}

function driverOpts(selected = '', excluded = []) {
  return `<option value="">Select driver</option>` +
    DRIVERS.map(d => {
      const isExcluded = excluded.includes(d) && d !== selected;
      return `<option value="${d}"${d === selected ? ' selected' : ''}${isExcluded ? ' disabled style="color:#444"' : ''}>${DRIVER_NUM[d]}. ${d}</option>`;
    }).join('');
}

  // raceName 에서 라운드 번호 추출 e.g. "Round 3 — Japanese"
  const match = state.raceName.match(/Round (\d+)/);

function onRoundChange() {
  const n = parseInt(document.getElementById('roundSelect').value);
  if (!n) return;
  const round = ROUNDS.find(r => r.n === n);
  const newRaceName = `Round ${n} — ${round.name}`;

  if (newRaceName !== state.raceName) {
    // 현재 라운드 데이터 저장
    saveRoundData();
    // 새 라운드 데이터 불러오기
    state.raceName = newRaceName;
    state.weekendType = SPRINT_ROUNDS.has(n) ? 'sprint' : 'gp';
    loadRoundData(newRaceName);
    ensureSessions();
    if (window.fbSave) window.fbSave();
  }
}

function saveRoundData() {
  // 현재 라운드 데이터를 roundData에 저장
  if (!state.raceName) return;
  state.roundData[state.raceName] = {
    participants: JSON.parse(JSON.stringify(state.participants)),
    results: JSON.parse(JSON.stringify(state.results)),
    resultLocked: JSON.parse(JSON.stringify(state.resultLocked)),
    constructors: JSON.parse(JSON.stringify(state.constructors)),
  };
}

function loadRoundData(raceName) {
  // 해당 라운드 데이터 불러오기 (없으면 빈 상태)
  const d = state.roundData[raceName];
  if (d) {
    state.participants = JSON.parse(JSON.stringify(d.participants));
    state.results = JSON.parse(JSON.stringify(d.results));
    state.resultLocked = JSON.parse(JSON.stringify(d.resultLocked || {}));
    if (d.constructors) {
      state.constructors = JSON.parse(JSON.stringify(d.constructors));
      window._state.constructors = state.constructors;
    }
  } else {
    state.participants = NAMES.map(name => ({ name, sessions: {} }));
    state.results = {};
    state.resultLocked = {};
    // 새 라운드는 현재 constructors 그대로 유지
  }
  window._state.participants = state.participants;
  window._state.results = state.results;
  window._state.resultLocked = state.resultLocked;
}

  const n = parseInt(document.getElementById('roundSelect').value);

  const unique = new Set(state.constructors);
  if (unique.size < state.constructors.length) { alert('Duplicate teams in constructor standings!'); return; }

  'Ferrari':           'Scuderia Ferrari HP',

async function fetchStandings() {
  const btn = document.getElementById('fetchBtn');
  const status = document.getElementById('fetchStatus');
  btn.disabled = true; btn.textContent = '⏳ Fetching...'; status.textContent = '';
  try {
    // 2026 시즌 컨스트럭터 순위 (시즌 중엔 실시간, 시즌 전엔 이전 시즌)
    const res = await fetch('https://api.jolpi.ca/ergast/f1/2025/constructorstandings.json');
    if (!res.ok) throw new Error('Network error');
    const data = await res.json();
    const standings = data?.MRData?.StandingsTable?.StandingsLists?.[0]?.ConstructorStandings;
    if (!standings || !standings.length) throw new Error('데이터를 찾을 수 없어요');

    const ordered = [];
    for (const s of standings) {
      const mapped = ERGAST_MAP[s.Constructor.name] || null;
      if (mapped && !ordered.includes(mapped)) ordered.push(mapped);
    }
    // 매핑 안 된 팀(Cadillac 등)은 뒤에 추가
    DEFAULT_CONSTRUCTORS.forEach(t => { if (!ordered.includes(t)) ordered.push(t); });
    const final11 = ordered.slice(0, 11);
    state.constructors = final11;
    window._state.constructors = final11;
    renderConstructors();
    if (window.fbSave) window.fbSave();
    status.innerHTML = '<span style="color:#00c864">✅ Updated!</span>';
    btn.disabled = false; btn.textContent = 'Update Constructor Standings';
  } catch(e) {
    status.innerHTML = `<span style="color:#ff6b6b">❌ ${e.message}</span>`;
    btn.disabled = false; btn.textContent = 'Update Constructor Standings';
  }
}

function onPick(pi, key, idx, val) {
  state.participants[pi].sessions[key].picks[idx] = val;
  const picks = state.participants[pi].sessions[key].picks;
  [0, 1, 2].forEach(i => {
    if (i === idx) return;
    const sel = document.getElementById(`pick-${pi}-${key}-${i}`);
    if (!sel) return;
    const excluded = picks.filter((_, j) => j !== i);
    const cur = picks[i];
    sel.innerHTML = driverOpts(cur, excluded);
  });
  if (window.saveRoundData) window.saveRoundData();
  if (window.fbSave) window.fbSave();
}

function lock(pi, key) {
  const sess = state.participants[pi].sessions[key];
  const name = state.participants[pi].name;
  const label = sessions().find(s => s.key === key)?.label || key;
  const [a,b,c] = sess.picks;
  if (!a || !b || !c) { alert(`${name} — ${label}: Select P1, P2, and P3!`); return; }
  if (new Set([a,b,c]).size < 3) { alert(`${name} — ${label}: Select 3 different drivers!`); return; }
  sess.locked = true;
  if (window.saveRoundData) window.saveRoundData();
  if (window.fbSave) window.fbSave();
  renderPredict();
}

function unlock(pi, key) {
  state.participants[pi].sessions[key].locked = false;
  if (window.saveRoundData) window.saveRoundData();
  if (window.fbSave) window.fbSave();
  renderPredict();
}

function checkResult(key) {
  const r0 = document.getElementById(`res-${key}-0`)?.value;
  const r1 = document.getElementById(`res-${key}-1`)?.value;

  const s = sessions().find(s => s.key === key);
  if (!r0 || !r1 || !r2) { alert(`${s.label}: P1, P2, P3 결과를 모두 입력하세요!`); return; }
  if (new Set([r0,r1,r2]).size < 3) { alert(`${s.label}: 서로 다른 드라이버 3명을 선택하세요!`); return; }

  state.results[key] = [r0, r1, r2];
  state.resultLocked[key] = true;

  const scored = state.participants.map(p => {
    const picks = p.sessions[key]?.picks || ['','',''];
    const r = calcSession(picks, [r0,r1,r2], s.mult);
    return { name: p.name, totalPts: r.totalPts, breakdown: [{ label: s.label, ...r }] };
  });

  // 카드 상태 업데이트
  const card = document.getElementById(`sess-card-${key}`);
  if (card) {
    card.style.borderColor = 'rgba(0,200,100,0.4)';
    card.style.borderWidth = '2px';
    card.querySelector('.res-grid').style.pointerEvents = 'none';
    card.querySelector('.res-grid').style.opacity = '0.5';
    card.querySelector('.res-btn-wrap').innerHTML = `
      <button class="btn sec" style="font-size:10px;padding:10px 18px;flex:0 0 auto;width:auto;" onclick="unlockResult('${key}')">✏️ Edit</button>
      <div style="flex:1;display:flex;align-items:center;justify-content:center;background:rgba(0,200,100,0.07);border:1px solid rgba(0,200,100,0.2);border-radius:8px;font-size:11px;color:#00c864;font-family:'Orbitron',sans-serif;letter-spacing:1px;">✓ LOCKED IN</div>`;
  }

  renderSessionBoard(key, scored, s.label);
  if (window.saveRoundData) window.saveRoundData();
  if (window.fbSave) window.fbSave();
  tryRenderCombined();
}

// Edit 누르면 → 결과 초기화, Check Result 버튼으로 복귀 (예측 탭 unlock과 동일)
function unlockResult(key) {
  state.results[key] = ['','',''];
  state.resultLocked[key] = false;

  const card = document.getElementById(`sess-card-${key}`);
  if (card) {
    card.style.borderColor = 'var(--border)';
    card.style.borderWidth = '1px';
    const grid = card.querySelector('.res-grid');
    grid.style.pointerEvents = '';
    grid.style.opacity = '';
    // 선택 초기화
    [0,1,2].forEach(i => {
      const sel = document.getElementById(`res-${key}-${i}`);
      if (sel) sel.innerHTML = driverOpts('', []);
    });
    card.querySelector('.res-btn-wrap').innerHTML = `
      <button class="btn grn" style="width:100%;font-size:10px;padding:10px;" onclick="checkResult('${key}')">🏁 Check Result</button>`;
    const board = document.getElementById(`result-board-${key}`);
    if (board) { board.innerHTML = ''; board.style.display = 'none'; }
  }

  if (window.saveRoundData) window.saveRoundData();
  if (window.fbSave) window.fbSave();
}

function onResult(key, idx, val) {
  if (!state.results[key]) state.results[key] = ['','',''];
  state.results[key][idx] = val;
  const res = state.results[key];
  [0,1,2].forEach(i => {
    if (i === idx) return;
    const sel = document.getElementById(`res-${key}-${i}`);
    if (!sel) return;
    sel.innerHTML = driverOpts(res[i], res.filter((_,j) => j !== i));
  });
}

// Firebase 수신 시 결과 탭 동기화
function syncResultTab() {
  // 항상 renderResult()로 새로 그림 — locked 상태는 renderResult 안에서 복원됨
  renderResult();
}
window.syncResultTab = syncResultTab;

function renderSessionBoard(key, scored, label) {
  const wrap = document.getElementById(`result-board-${key}`);
  const { payments, net } = computePayments(scored);
  wrap.innerHTML = renderPaymentTable(scored, payments, net, false);
  wrap.style.display = 'block';
}

function tryRenderCombined() {
  const allDone = sessions().every(s => {
    const r = state.results[s.key];
    return r && r[0] && r[1] && r[2];
  });
  if (!allDone) return;

  // Sum points across all sessions
  const scored = state.participants.map(p => {
    let totalPts = 0;
    const breakdown = sessions().map(s => {
      const picks = p.sessions[s.key]?.picks || ['','',''];
      const actual = state.results[s.key];
      const r = calcSession(picks, actual, s.mult);
      totalPts += r.totalPts;
      return { label: s.label, ...r };
    });
    return { name: p.name, totalPts, breakdown };
  });

  const { payments, net } = computePayments(scored);
  const isSaved = window._seasonLog.some(e => e.raceName === state.raceName);
  document.getElementById('combined-board').innerHTML =
    renderPaymentTable(scored, payments, net, true) +
    `<div style="margin-top:20px;display:flex;gap:10px;">
       <button id="saveSeasonBtn" class="btn${isSaved ? ' sec' : ' grn'}" style="${isSaved ? 'opacity:0.5;cursor:not-allowed;' : ''}flex:1" onclick="saveToSeason()" ${isSaved ? 'disabled' : ''}>
         ${isSaved ? '✅ 저장 완료' : '💾 최종 결과 저장'}
       </button>
       <button id="editSeasonBtn" class="btn sec" style="width:auto;padding:14px 20px;display:${isSaved ? 'block' : 'none'};" onclick="editSeasonSave()">✏️ EDIT</button>
     </div>`;
  const wrap = document.getElementById('combined-wrap');
  wrap.style.display = 'block';
}

function computePayments(scored) {
  const n = scored.length;
  const net = new Array(n).fill(0);
  const payments = [];
  for (let i = 0; i < n; i++) {
    for (let j = i + 1; j < n; j++) {
      const diff = scored[j].totalPts - scored[i].totalPts;
      if (diff === 0) continue;
      const amount = Math.abs(diff) * 5000;
      if (diff > 0) {
        payments.push({ from: i, to: j, pts: Math.abs(diff), amount });
        net[i] -= amount; net[j] += amount;
      } else {
        payments.push({ from: j, to: i, pts: Math.abs(diff), amount });
        net[j] -= amount; net[i] += amount;
      }
    }
  }
  return { payments, net };
}

function calculate() {} // legacy stub — not used

function renderPaymentTable(scored, payments, net, showBreakdown) {
  // Assign ranks
  const sorted = [...scored].map((p, i) => ({ ...p, idx: i })).sort((a,b) => b.totalPts - a.totalPts);
  sorted.forEach((p, i) => {
    p.rank = i > 0 && p.totalPts === sorted[i-1].totalPts ? sorted[i-1].rank : i + 1;
    scored[p.idx].rank = p.rank;
  });

  const rankEmoji = ['🥇','🥈','🥉'];
  const rankCls   = ['winner','second','third'];

  // Points breakdown rows
  const pointsRows = sorted.map(p => {
    const cls   = p.rank <= 3 ? rankCls[p.rank-1] : '';
    const emoji = p.rank <= 3 ? rankEmoji[p.rank-1] : `${p.rank}`;
    const ptColor = p.rank===1?'var(--gold)':p.rank===2?'var(--silver)':p.rank===3?'var(--bronze)':'var(--muted)';

    const lines = showBreakdown
      ? p.breakdown.map(b => {
          const hits = b.details.map(d =>
            d.hit ? `<span class="hit-badge hit">P${d.pos} +${d.base}×${d.cm}</span>`
                  : `<span class="hit-badge miss">P${d.pos} ✕</span>`
          ).join('');
          const pts = b.correct > 0
            ? `<span class="sess-pts">→ ×${b.correctMult}×${b.sessMult} = <strong style="color:#fff">${b.totalPts}pt</strong></span>`
            : `<span class="sess-pts">0pt</span>`;
          return `<div class="sess-breakdown-line"><span class="sess-breakdown-label">${b.label}</span>${hits}&nbsp;${pts}</div>`;
        }).join('')
      : p.breakdown.map(b => {
          const hits = b.details.map(d =>
            d.hit ? `<span class="hit-badge hit">P${d.pos} +${d.base}×${d.cm}</span>`
                  : `<span class="hit-badge miss">P${d.pos} ✕</span>`
          ).join('');
          const pts = b.correct > 0
            ? `<span class="sess-pts">→ <strong style="color:#fff">${b.totalPts}pt</strong></span>`
            : `<span class="sess-pts">0pt</span>`;
          return `<div class="sess-breakdown-line">${hits}&nbsp;${pts}</div>`;
        }).join('');

    return `
    <div class="score-row ${cls}">
      <span class="score-rank">${emoji}</span>
      <span class="score-name">${p.name}</span>
      <div class="score-breakdown">${lines}</div>
      <span style="font-family:'Orbitron',sans-serif;font-size:17px;font-weight:900;min-width:70px;text-align:right;color:${ptColor}">${p.totalPts}pt</span>
    </div>`;
  }).join('');

  // Payment rows
  const payRows = payments.length === 0
    ? `<div style="text-align:center;padding:16px;color:var(--muted);font-size:13px;">모두 동점 — 정산 없음</div>`
    : payments.map(pay => `
      <div style="display:flex;align-items:center;gap:12px;background:var(--surface2);border:1px solid rgba(255,255,255,0.07);border-radius:8px;padding:13px 18px;">
        <span style="font-family:'Orbitron',sans-serif;font-size:14px;font-weight:700;color:var(--red);min-width:32px">${scored[pay.from].name}</span>
        <span style="color:var(--muted);font-size:12px;flex:1">→&nbsp;<span style="color:#fff;font-weight:600">${scored[pay.to].name}</span>&nbsp;<span style="color:rgba(255,255,255,0.3);font-size:11px">(${pay.pts}pt 차)</span></span>
        <span style="font-family:'Orbitron',sans-serif;font-size:15px;font-weight:700;color:#fff">₩${pay.amount.toLocaleString()}</span>
      </div>`).join('');

  // Net rows
  const netRows = scored.map((p, i) => {
    const v = net[i];
    const color = v > 0 ? '#00c864' : v < 0 ? 'var(--red)' : 'var(--muted)';
    const sign  = v < 0 ? '-' : '';
    return `
      <div style="display:flex;align-items:center;gap:12px;background:var(--surface2);border:1px solid rgba(255,255,255,0.07);border-radius:8px;padding:13px 18px;">
        <span style="font-family:'Orbitron',sans-serif;font-size:15px;font-weight:900;letter-spacing:3px;flex:1">${p.name}</span>
        <span style="font-size:12px;color:var(--muted)">${p.totalPts}pt</span>
        <span style="font-family:'Orbitron',sans-serif;font-size:16px;font-weight:700;color:${color};min-width:110px;text-align:right;">${sign}₩${Math.abs(v).toLocaleString()}</span>
      </div>`;
  }).join('');

  return `
    <div style="margin-bottom:8px;">
      <div style="font-family:'Orbitron',sans-serif;font-size:10px;letter-spacing:2px;color:var(--muted);margin-bottom:10px;text-transform:uppercase;">📊 점수</div>
      <div class="scoreboard" style="margin-bottom:0;">${pointsRows}</div>
    </div>
    <hr style="border:none;border-top:1px solid rgba(255,255,255,0.07);margin:18px 0;">
    <div style="margin-bottom:8px;">
      <div style="font-family:'Orbitron',sans-serif;font-size:10px;letter-spacing:2px;color:var(--muted);margin-bottom:10px;text-transform:uppercase;">💸 1v1 정산</div>
      <div style="display:flex;flex-direction:column;gap:8px;">${payRows}</div>
    </div>
    <hr style="border:none;border-top:1px solid rgba(255,255,255,0.07);margin:18px 0;">
    <div>
      <div style="font-family:'Orbitron',sans-serif;font-size:10px;letter-spacing:2px;color:var(--muted);margin-bottom:10px;text-transform:uppercase;">🏦 총 손익</div>
      <div style="display:flex;flex-direction:column;gap:8px;">${netRows}</div>
    </div>`;
}

// ── Season Tab ────────────────────────────────────────────
// seasonLog: array of { raceName, weekendType, sessions:[{key,label,mult}],
//   participants:[{name, sessions:{key:{picks,locked}}}], results:{key:[...]},
//   scored:[{name,totalPts,breakdown}], payments:[...], net:[...] }
let seasonLog = window._seasonLog;

function saveToSeason() {
  seasonLog = window._seasonLog;  // 항상 최신 데이터 사용
  // Build scored + payments from current state (same as tryRenderCombined)
  const scored = state.participants.map(p => {
    let totalPts = 0;
    const breakdown = sessions().map(s => {
      const picks = p.sessions[s.key]?.picks || ['','',''];
      const actual = state.results[s.key];
      const r = calcSession(picks, actual, s.mult);
      totalPts += r.totalPts;
      return { label: s.label, key: s.key, mult: s.mult, ...r };
    });
    return { name: p.name, totalPts, breakdown };
  });
  const { payments, net } = computePayments(scored);

  // Check if this round already saved → update instead
  const existingIdx = seasonLog.findIndex(e => e.raceName === state.raceName);
  const entry = {
    raceName: state.raceName,
    weekendType: state.weekendType,
    sessions: sessions().map(s => ({ key: s.key, label: s.label, mult: s.mult })),
    participants: state.participants.map(p => ({
      name: p.name,
      sessions: Object.fromEntries(
        Object.entries(p.sessions).map(([k, v]) => [k, { picks: [...v.picks] }])
      )
    })),
    results: Object.fromEntries(
      Object.entries(state.results).map(([k, v]) => [k, [...v]])
    ),
    scored,
    payments,
    net,
  };

  if (existingIdx >= 0) {
    seasonLog[existingIdx] = entry;
  } else {
    seasonLog.push(entry);
  }
  window._seasonLog = seasonLog;
  if (window.saveRoundData) window.saveRoundData();
  if (window.fbSave) window.fbSave();

  // Update button UI → saved state
  const btn = document.getElementById('saveSeasonBtn');
  if (btn) {
    btn.textContent = '✅ 저장 완료';
    btn.disabled = true;
    btn.style.opacity = '0.5';
    btn.style.cursor = 'not-allowed';
    btn.classList.remove('grn');
    btn.classList.add('sec');
  }
  const editBtn = document.getElementById('editSeasonBtn');
  if (editBtn) editBtn.style.display = 'block';

  renderSeason();
}

function editSeasonSave() {
  // Re-enable the save button for editing
  const btn = document.getElementById('saveSeasonBtn');
  if (btn) {
    btn.textContent = '💾 최종 결과 저장';
    btn.disabled = false;
    btn.style.opacity = '1';
    btn.style.cursor = 'pointer';
    btn.classList.remove('sec');
    btn.classList.add('grn');
    btn.onclick = saveToSeason;
  }
  // Hide EDIT button
  const editBtn = document.getElementById('editSeasonBtn');
  if (editBtn) editBtn.style.display = 'none';
}

function renderSeason() {
  seasonLog = window._seasonLog;  // Firebase 수신 후 최신 데이터 동기화
  const el = document.getElementById('seasonContent');
  if (!seasonLog.length) {
    el.innerHTML = `<div class="notice" style="text-align:center;padding:32px;">아직 저장된 결과가 없어요.<br>결과 탭에서 <strong>최종 결과 저장</strong>을 눌러주세요.</div>`;
    return;
  }

  // Compute cumulative net per person
  const names = state.participants.map(p => p.name);
  const cumNet = {};
  names.forEach(n => cumNet[n] = 0);
  seasonLog.forEach(entry => {
    entry.scored.forEach((p, i) => {
      if (cumNet[p.name] !== undefined) cumNet[p.name] += entry.net[i];
    });
  });

  // ── Cumulative standings card ──
  const cumSorted = names.map(n => ({ name: n, total: cumNet[n] }))
    .sort((a, b) => b.total - a.total);
  const rankEmoji = ['🥇','🥈','🥉'];
  const cumRows = cumSorted.map((p, i) => {
    const color = p.total > 0 ? '#00c864' : p.total < 0 ? 'var(--red)' : 'var(--muted)';
    const sign  = p.total < 0 ? '-' : '';
    return `
    <div style="display:flex;align-items:center;gap:14px;background:var(--surface2);border:1px solid rgba(255,255,255,0.07);border-radius:8px;padding:16px 20px;">
      <span style="font-size:20px">${rankEmoji[i] || i+1}</span>
      <span style="font-family:'Orbitron',sans-serif;font-size:18px;font-weight:900;letter-spacing:3px;flex:1">${p.name}</span>
      <span style="font-family:'Orbitron',sans-serif;font-size:18px;font-weight:700;color:${color}">${sign}₩${Math.abs(p.total).toLocaleString()}</span>
    </div>`;
  }).join('');

  // ── Per-round history cards ──
  const roundCards = [...seasonLog].reverse().map(entry => {
    const sessionRows = entry.sessions.map(s => {
      const actual = entry.results[s.key] || [];
      const actualStr = actual.filter(Boolean).length === 3
        ? actual.map((d, i) => `P${i+1}: ${d}`).join(' / ')
        : '—';

      const pickRows = entry.participants.map(p => {
        const picks = p.sessions[s.key]?.picks || ['','',''];
        const picksStr = picks.map((d, i) => d ? `P${i+1}: ${d}` : `P${i+1}: —`).join(' / ');
        const sc = entry.scored.find(x => x.name === p.name);
        const bd = sc?.breakdown.find(b => b.key === s.key);
        const pts = bd ? `${bd.totalPts}pt` : '—';
        return `<div style="display:flex;gap:8px;align-items:center;font-size:12px;padding:4px 0;border-bottom:1px solid rgba(255,255,255,0.04);">
          <span style="font-family:'Orbitron',sans-serif;font-weight:700;color:#fff;min-width:30px">${p.name}</span>
          <span style="color:var(--muted);flex:1">${picksStr}</span>
          <span style="font-family:'Orbitron',sans-serif;font-size:11px;color:rgba(255,255,255,0.5)">${pts}</span>
        </div>`;
      }).join('');

      return `
      <div style="margin-bottom:14px;">
        <div class="sess-head" style="margin-bottom:8px;">
          <span class="sess-label">${s.label}</span>
          <span style="font-size:11px;color:var(--muted)">RESULT: <strong style="color:#fff">${actualStr}</strong></span>
        </div>
        ${pickRows}
      </div>`;
    }).join('');

    // Net summary for this round
    const netSummary = entry.scored.map((p, i) => {
      const v = entry.net[i];
      const color = v > 0 ? '#00c864' : v < 0 ? 'var(--red)' : 'var(--muted)';
      const sign = v < 0 ? '-' : '';
      return `<span style="font-family:'Orbitron',sans-serif;font-size:12px;color:${color}">${p.name} ${sign}₩${Math.abs(v).toLocaleString()}</span>`;
    }).join('<span style="color:rgba(255,255,255,0.15);margin:0 6px">·</span>');

    return `
    <div class="card">
      <div style="display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:16px;flex-wrap:wrap;gap:8px;">
        <div class="card-title" style="margin-bottom:0">${entry.raceName}</div>
        <span style="font-size:10px;padding:3px 10px;border-radius:4px;background:rgba(225,6,0,0.1);color:var(--red);border:1px solid rgba(225,6,0,0.2);font-family:'Orbitron',sans-serif;">
          ${entry.weekendType === 'sprint' ? '🟠 Sprint' : '⬜ GP'}
        </span>
      </div>
      ${sessionRows}
      <div style="margin-top:8px;padding-top:10px;border-top:1px solid rgba(255,255,255,0.07);display:flex;flex-wrap:wrap;gap:10px;align-items:center;">
        <span style="font-size:10px;color:var(--muted);font-family:'Orbitron',sans-serif;letter-spacing:1px;">이번 라운드 손익</span>
        ${netSummary}
      </div>
    </div>`;
  }).join('');

  el.innerHTML = `
    <div class="card">
      <div class="card-title">🏆 시즌 누적 손익</div>
      <div style="display:flex;flex-direction:column;gap:8px;">${cumRows}</div>
    </div>
    <div class="card-title" style="margin:8px 0 16px;padding-left:4px;">📋 라운드별 기록</div>
    ${roundCards}`;
}

// ── Tab switch ───────────────────────────────────────────
function switchTab(tab) {
  const tabKeys = ['setup','predict','result','season'];
  document.querySelectorAll('.tab').forEach((t, i) =>
    t.classList.toggle('active', tabKeys[i] === tab));
  document.querySelectorAll('.section').forEach((s, i) =>
    s.classList.toggle('active', ['tab-setup','tab-predict','tab-result','tab-season'][i] === `tab-${tab}`));
  if (tab === 'predict') renderPredict();
  if (tab === 'result')  syncResultTab();
  if (tab === 'season')  renderSeason();
}
window.switchTab = switchTab;

init();
